<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>About me v2</title>
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <img src="logo.png" alt="Logo" />
          <h2>Mon site web</h2>
        </div>
        <div class="hamburger" id="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <ul class="nav-links" id="navLinks">
          <li><a href="#home">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#services">Services</a></li>
          <li><a class="nav-cta-button" href="#contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <section id="home" class="parallax-section">
      <div class="parallax-bg"></div>
      <div class="parallax-content">
        <h1>Bonjour, je Christopher</h1>
        <h2>Développeur Web</h2>
      </div>
    </section>

    <section id="about" class="parallax-section">
      <div class="parallax-bg"></div>
      <div class="parallax-content">
        <h2>À propos de moi</h2>
        <p>Dev web self-taught, passionné de PC gaming et de code</p>
      </div>
    </section>

    <section id="services" class="parallax-section">
      <div class="parallax-bg"></div>
      <div class="parallax-content">
        <h2>Mes Services</h2>
        <ul>
          <li>Création de sites web</li>
          <li>Optimisation performance</li>
          <li>Design responsive</li>
        </ul>
      </div>
    </section>

    <section id="contact" class="parallax-section">
      <div class="parallax-bg"></div>
      <div class="contact-container">
        <h2>Contactez-moi</h2>
        <form class="contact-form">
          <input type="text" placeholder="Votre nom" required />
          <input type="email" placeholder="Votre email" required />
          <textarea placeholder="Votre message" required></textarea>
          <button type="submit">Envoyer</button>
        </form>
      </div>
    </section>
    <!-- Bouton Remonter en haut (mobile seulement) -->
    <a href="#home" class="back-to-top" aria-label="Remonter en haut">
      <i class="fas fa-arrow-up"></i>
    </a>

    <script src="script.js"></script>
    <script src="script.js"></script>
  </body>
</html>
